<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tibetan Letter Tracer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Serif+Tibetan:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F2F4F8;--surface:#FFFFFF;--border:#DDE2EF;--text-1:#0F172A;--text-2:#475569;
  --text-3:#94A3B8;--accent:#1D4ED8;--accent-lt:#EFF6FF;--green:#15803D;
  --green-lt:#F0FDF4;--ink:#1E293B;--radius:14px;--shadow:0 2px 16px rgba(0,0,0,0.07);
  --canvas-size:min(420px,calc(100vw - 40px));
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;color:var(--text-1);
  touch-action:none;user-select:none;-webkit-user-select:none;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:50}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:34px;height:34px;background:var(--ink);border-radius:9px;display:flex;
  align-items:center;justify-content:center;font-family:'Noto Serif Tibetan',serif;color:#fff;font-size:1rem;flex-shrink:0}
.topbar h1{font-size:.9rem;font-weight:700}
.topbar h1 small{display:block;font-size:.72rem;font-weight:400;color:var(--text-3)}
.btn-topbar{padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);
  font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:700;color:var(--text-2);cursor:pointer;
  white-space:nowrap;transition:border-color .12s,color .12s}
.btn-topbar:hover{border-color:var(--accent);color:var(--accent)}
#screenPaste{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:20px}
.paste-card{background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow);
  padding:28px 24px;width:100%;max-width:480px;display:flex;flex-direction:column;gap:16px}
.paste-card h2{font-size:1.1rem;font-weight:700}
.paste-card p{font-size:.82rem;color:var(--text-2);line-height:1.6}
.paste-card p strong{color:var(--text-1)}
textarea#jsonInput{width:100%;min-height:180px;resize:vertical;font-family:'Courier New',monospace;
  font-size:.68rem;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  background:#F8FAFC;color:var(--text-1);outline:none;line-height:1.5;transition:border-color .15s}
textarea#jsonInput:focus{border-color:var(--accent)}
.paste-error{font-size:.78rem;color:#DC2626;font-weight:600;display:none;padding:8px 12px;
  background:#FEF2F2;border-radius:8px;border:1px solid #FECACA}
.btn-primary{width:100%;padding:13px;border-radius:11px;border:none;background:var(--ink);color:white;
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:background .14s}
.btn-primary:hover{background:#0F172A}
#screenTrace{display:none;flex:1;flex-direction:column;align-items:center;padding:16px 16px 32px;
  gap:12px;max-width:520px;margin:0 auto;width:100%}
.strip-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.strip-wrap::-webkit-scrollbar{display:none}
.letter-strip{display:flex;gap:5px;padding:2px 0;width:max-content}
.ls-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);
  font-family:'Noto Serif Tibetan',serif;font-size:.95rem;color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:border-color .1s,background .1s;position:relative}
.ls-btn:hover{border-color:var(--accent);background:var(--accent-lt)}
.ls-btn.active{border-color:var(--ink);background:var(--ink);color:white}
.ls-btn.done{border-color:var(--green);background:var(--green-lt);color:var(--green)}
.ls-btn.done::after{content:'✓';position:absolute;top:-4px;right:-4px;width:12px;height:12px;
  background:var(--green);color:white;font-size:7px;font-family:'DM Sans',sans-serif;font-weight:700;
  border-radius:50%;display:flex;align-items:center;justify-content:center}
.info-bar{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.ib-char{font-family:'Noto Serif Tibetan',serif;font-size:1.9rem;width:50px;height:50px;background:var(--bg);
  border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--text-1);line-height:1}
.ib-meta{flex:1;min-width:0}
.ib-meta h2{font-size:.95rem;font-weight:700}
.ib-meta p{font-size:.72rem;color:var(--text-3);font-weight:500;margin-top:1px}
.ib-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.stroke-chip{font-size:.7rem;font-weight:700;color:white;background:var(--accent);padding:3px 10px;
  border-radius:99px;white-space:nowrap}
.stroke-chip.done-chip{background:var(--green)}
.stroke-dots{display:flex;gap:4px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background .15s}
.sdot.active{background:var(--accent)}
.sdot.complete{background:var(--green)}
.canvas-wrap{position:relative;width:var(--canvas-size);height:var(--canvas-size);border-radius:16px;
  border:1.5px solid var(--border);background:#FAFBFF;touch-action:none;cursor:crosshair;
  overflow:hidden;box-shadow:var(--shadow);flex-shrink:0}
.canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.hint{width:100%;font-size:.78rem;font-weight:500;color:var(--text-2);background:var(--surface);
  border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center;line-height:1.5}
.hint.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent);font-weight:600}
.hint.done{border-color:var(--green);background:var(--green-lt);color:var(--green);font-weight:700}
.controls{display:flex;gap:8px;width:100%}
.btn-c{flex:1;padding:11px 8px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);
  font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:700;color:var(--text-2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:border-color .1s,background .1s,color .1s}
.btn-c:hover:not(:disabled){border-color:var(--accent);background:var(--accent-lt);color:var(--accent)}
.btn-c.dark{background:var(--ink);border-color:var(--ink);color:white}
.btn-c.dark:hover:not(:disabled){background:#0F172A}
.btn-c.success{background:var(--green);border-color:var(--green);color:white}
.btn-c.success:hover:not(:disabled){background:#14532D}
.btn-c:disabled{opacity:.35;pointer-events:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">ཀ</div>
    <h1>Tibetan Tracer <small>Guided stroke-by-stroke tracing</small></h1>
  </div>
  <button class="btn-topbar" onclick="showPaste()">⬆ Load JSON</button>
</div>

<div id="screenPaste">
  <div class="paste-card">
    <h2>Load your stroke data</h2>
    <p>Export JSON from the <strong>Stroke Recorder</strong>, then paste it below.</p>
    <textarea id="jsonInput" placeholder='Paste JSON here…'></textarea>
    <div class="paste-error" id="pasteError"></div>
    <button class="btn-primary" onclick="loadJSON()">Load Letters →</button>
  </div>
</div>

<div id="screenTrace">
  <div class="strip-wrap"><div class="letter-strip" id="letterStrip"></div></div>
  <div class="info-bar">
    <div class="ib-char" id="ibChar">ཀ</div>
    <div class="ib-meta"><h2 id="ibName">Ka</h2><p id="ibDesc">1st consonant</p></div>
    <div class="ib-right">
      <div class="stroke-chip" id="strokeChip">Stroke 1 of 1</div>
      <div class="stroke-dots" id="strokeDots"></div>
    </div>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="bgCanvas"></canvas>
    <canvas id="trCanvas"></canvas>
    <canvas id="guCanvas"></canvas>
  </div>
  <div class="hint" id="hint">Follow the numbered waypoints — trace along the letter path</div>
  <div class="controls">
    <button class="btn-c"      id="btnPrev"  onclick="prevLetter()">← Prev</button>
    <button class="btn-c"      id="btnReset" onclick="resetLetter()">↺ Retry</button>
    <button class="btn-c dark" id="btnNext"  onclick="nextLetter()">Next →</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIGURATION CONSTANTS
═══════════════════════════════════════════════════════ */
const CONFIG = {
  TOLERANCE_RATIO: 0.08,           // 8% of canvas size for tracing tolerance
  GUIDE_DOT_SPACING: 0.05,         // Spacing for dotted guide line (normalized)
  KEY_POINT_ANGLE_THRESHOLD: Math.PI / 5,  // 36 degrees for corner detection
  PROGRESS_GRANULARITY: 2,          // Pixels per progress step
};

/* ═══════════════════════════════════════════════════════
   GEOMETRY UTILITIES
═══════════════════════════════════════════════════════ */

/**
 * Calculate Euclidean distance between two points
 */
function distance(p1, p2) {
  const dx = p2.x - p1.x;
  const dy = p2.y - p1.y;
  return Math.sqrt(dx * dx + dy * dy);
}

/**
 * Calculate distance from point p to line segment vw
 */
function distanceToSegment(p, v, w) {
  const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
  if (l2 === 0) return distance(p, v);

  let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
  t = Math.max(0, Math.min(1, t));

  const projection = {
    x: v.x + t * (w.x - v.x),
    y: v.y + t * (w.y - v.y)
  };

  return distance(p, projection);
}

/**
 * Calculate angle between three points (p0-p1-p2)
 * Returns the interior angle in radians
 */
function calculateAngle(p0, p1, p2) {
  const v1 = { x: p0.x - p1.x, y: p0.y - p1.y };
  const v2 = { x: p2.x - p1.x, y: p2.y - p1.y };

  const dot = v1.x * v2.x + v1.y * v2.y;
  const cross = v1.x * v2.y - v1.y * v2.x;

  return Math.atan2(Math.abs(cross), dot);
}

/**
 * Find the closest point on a polyline to a given point
 * Returns the point and the index of the segment
 */
function findClosestPointOnPath(points, userPoint) {
  let minDist = Infinity;
  let closestPoint = points[0];
  let closestIndex = 0;

  for (let i = 0; i < points.length - 1; i++) {
    const p = points[i];
    const p2 = points[i + 1];

    // Find closest point on this segment
    const l2 = (p2.x - p.x) ** 2 + (p2.y - p.y) ** 2;
    if (l2 === 0) {
      const d = distance(userPoint, p);
      if (d < minDist) {
        minDist = d;
        closestPoint = p;
        closestIndex = i;
      }
      continue;
    }

    let t = ((userPoint.x - p.x) * (p2.x - p.x) + (userPoint.y - p.y) * (p2.y - p.y)) / l2;
    t = Math.max(0, Math.min(1, t));

    const proj = {
      x: p.x + t * (p2.x - p.x),
      y: p.y + t * (p2.y - p.y)
    };

    const d = distance(userPoint, proj);
    if (d < minDist) {
      minDist = d;
      closestPoint = proj;
      closestIndex = i;
    }
  }

  // Check last point
  const lastPoint = points[points.length - 1];
  const d = distance(userPoint, lastPoint);
  if (d < minDist) {
    minDist = d;
    closestPoint = lastPoint;
    closestIndex = points.length - 1;
  }

  return { point: closestPoint, index: closestIndex, distance: minDist };
}

/**
 * Get cumulative distance at a point index along a stroke
 */
function getDistanceAtPoint(points, index) {
  let dist = 0;
  for (let i = 1; i <= index && i < points.length; i++) {
    dist += distance(points[i - 1], points[i]);
  }
  return dist;
}

/**
 * Get total length of a stroke
 */
function getStrokeLength(points) {
  return getDistanceAtPoint(points, points.length - 1);
}

/**
 * Extract key points from a stroke path
 * Detects start, end, and direction change points (corners/curves)
 */
function extractKeyPoints(points) {
  if (points.length <= 2) {
    return points.map((p, i) => ({ point: p, index: i, type: i === 0 ? 'start' : 'end' }));
  }

  const keyPoints = [{ point: points[0], index: 0, type: 'start' }];

  // Look for direction changes
  for (let i = 2; i < points.length - 2; i++) {
    const angle = calculateAngle(points[i - 1], points[i], points[i + 1]);

    if (angle > CONFIG.KEY_POINT_ANGLE_THRESHOLD) {
      // This is a corner or sharp curve
      keyPoints.push({ point: points[i], index: i, type: 'corner' });
    }
  }

  keyPoints.push({ point: points[points.length - 1], index: points.length - 1, type: 'end' });

  return keyPoints;
}

/**
 * Generate evenly spaced waypoints along a stroke for smooth progress tracking
 */
function generateWaypoints(points, spacing) {
  if (points.length < 2) return points;

  const waypoints = [points[0]];
  let accumulatedDist = 0;
  let targetDist = spacing;

  for (let i = 1; i < points.length; i++) {
    const segLen = distance(points[i - 1], points[i]);

    while (accumulatedDist + segLen >= targetDist && i < points.length) {
      const t = (targetDist - accumulatedDist) / segLen;
      const interp = {
        x: points[i - 1].x + t * (points[i].x - points[i - 1].x),
        y: points[i - 1].y + t * (points[i].y - points[i - 1].y)
      };
      waypoints.push(interp);
      targetDist += spacing;
    }

    accumulatedDist += segLen;
  }

  // Always include the last point
  waypoints.push(points[points.length - 1]);

  return waypoints;
}

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let letters=[],lIdx=0,sIdx=0,done={},isDown=false;

// Tracking state
let currentProgress = 0;      // Current distance along stroke (in pixels)
let strokeTotalLength = 0;    // Total length of current stroke
let tolerance = 0;            // Current tolerance in pixels
let isOffPath = false;        // User is outside tolerance

// Normalized stroke data (0-1 coordinates)
let normStrokes = [];

// Canvas state
const bgC=document.getElementById('bgCanvas');
const trC=document.getElementById('trCanvas');
const guC=document.getElementById('guCanvas');
const wrap=document.getElementById('canvasWrap');
let bgX,trX,guX,CS,DPR;

/*
  ═══════════════════════════════════════════════════════
  CORE APPROACH — "FOG OF WAR" REVEAL
  ═══════════════════════════════════════════════════════
*/
let letterInkCanvas=null, letterDoneCanvas=null;
let revealCanvas=null, rvX=null;

/* ═══════════════════════════════════════════════════════
   JSON LOAD
═══════════════════════════════════════════════════════ */
function loadJSON(){
  const raw=document.getElementById('jsonInput').value.trim();
  const errEl=document.getElementById('pasteError');
  errEl.style.display='none';
  if(!raw){showErr('Please paste your JSON.');return;}
  let parsed;
  try{parsed=JSON.parse(raw);}catch(e){showErr('Invalid JSON.');return;}
  letters=[];

  // Handle new v1.0 format
  if (parsed.version === "1.0" && parsed.coordinateSystem === "normalized-0-1") {
    Object.entries(parsed.letters || {}).forEach(([char, data]) => {
      letters.push({
        char: char,
        name: data.name || char,
        desc: '',
        index: data.index || 0,
        strokes: data.strokes || []
      });
    });
  }
  // Handle old format
  else if(Array.isArray(parsed)){
    letters=parsed.filter(l=>l.char&&l.strokes&&l.strokes.length);
  }else if(typeof parsed==='object'){
    Object.entries(parsed).forEach(([char,v])=>{
      if(v&&v.strokes&&v.strokes.length)
        letters.push({char,name:v.name||char,desc:'',index:v.index||0,strokes:v.strokes});
    });
  }

  letters.sort((a,b)=>a.index-b.index);

  if(!letters.length){showErr('No valid letters found.');return;}
  done={};lIdx=0;showTrace();
}

function showErr(m){const el=document.getElementById('pasteError');el.textContent=m;el.style.display='block';}
function showPaste(){document.getElementById('screenPaste').style.display='flex';document.getElementById('screenTrace').style.display='none';}
function showTrace(){document.getElementById('screenPaste').style.display='none';document.getElementById('screenTrace').style.display='flex';buildStrip();loadLetter(0);}

/* ╀─ CANVAS SETUP ────────────────────────────────────── */
function setupCanvas(){
  DPR=window.devicePixelRatio||1;
  const r=wrap.getBoundingClientRect();
  CS=r.width;
  [bgC,trC,guC].forEach(c=>{
    c.width=Math.round(CS*DPR);c.height=Math.round(CS*DPR);
    c.style.width=CS+'px';c.style.height=CS+'px';
  });
  bgX=bgC.getContext('2d');bgX.scale(DPR,DPR);
  trX=trC.getContext('2d');trX.scale(DPR,DPR);
  guX=guC.getContext('2d');guX.scale(DPR,DPR);
}

/* ── GLYPH RENDERER ──────────────────────────────────── */
function renderGlyph(ctx,char,color){
  const fs=Math.round(CS*0.60);
  ctx.font=`700 ${fs}px "Noto Serif Tibetan",serif`;
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  const m=ctx.measureText(char);
  const th=m.actualBoundingBoxAscent+m.actualBoundingBoxDescent;
  const y=CS/2+m.actualBoundingBoxAscent-th/2;
  ctx.fillStyle=color;
  ctx.fillText(char,CS/2,y);
}

/* ── BUILD LETTER CANVASES ───────────────────────────── */
function buildLetterCanvases(char){
  [[INK_C, c=>{letterInkCanvas=c;}],[DONE_C, c=>{letterDoneCanvas=c;}]].forEach(([color,assign])=>{
    const c=document.createElement('canvas');
    c.width=Math.round(CS*DPR);c.height=Math.round(CS*DPR);
    const x=c.getContext('2d');x.scale(DPR,DPR);
    renderGlyph(x,char,color);
    assign(c);
  });
}

/* ── REVEAL CANVAS ───────────────────────────────────── */
function initRevealCanvas(){
  revealCanvas=document.createElement('canvas');
  revealCanvas.width=Math.round(CS*DPR);
  revealCanvas.height=Math.round(CS*DPR);
  rvX=revealCanvas.getContext('2d');
  rvX.scale(DPR,DPR);
}

const BR=()=>CS*0.10;

/**
 * Paint from progress distance along a stroke path
 */
function paintRevealFromProgress(strokePoints, fromDist, toDist) {
  if (toDist <= fromDist) return;

  const r = BR();
  rvX.save();
  rvX.strokeStyle = '#000';
  rvX.fillStyle = '#000';
  rvX.lineWidth = r * 2;
  rvX.lineCap = 'round';
  rvX.lineJoin = 'round';

  let accumulatedDist = 0;
  let started = false;

  for (let i = 1; i < strokePoints.length; i++) {
    const segLen = distance(strokePoints[i - 1], strokePoints[i]);

    if (!started && accumulatedDist + segLen > fromDist) {
      // Start painting within this segment
      started = true;
      rvX.beginPath();
      const t = (fromDist - accumulatedDist) / segLen;
      const startX = strokePoints[i - 1].x + t * (strokePoints[i].x - strokePoints[i - 1].x);
      const startY = strokePoints[i - 1].y + t * (strokePoints[i].y - strokePoints[i - 1].y);
      rvX.moveTo(startX, startY);
    }

    if (started) {
      if (accumulatedDist + segLen >= toDist) {
        // End painting within this segment
        const t = (toDist - accumulatedDist) / segLen;
        const endX = strokePoints[i - 1].x + t * (strokePoints[i].x - strokePoints[i - 1].x);
        const endY = strokePoints[i - 1].y + t * (strokePoints[i].y - strokePoints[i - 1].y);
        rvX.lineTo(endX, endY);
        rvX.stroke();
        break;
      } else {
        rvX.lineTo(strokePoints[i].x, strokePoints[i].y);
      }
    }

    accumulatedDist += segLen;
  }

  rvX.stroke();

  // Circle cap at current position
  if (started) {
    const currentPoint = getPointAtDistance(strokePoints, toDist);
    if (currentPoint) {
      rvX.beginPath();
      rvX.arc(currentPoint.x, currentPoint.y, r, 0, Math.PI * 2);
      rvX.fill();
    }
  }

  rvX.restore();
}

/**
 * Get point at a specific distance along a stroke
 */
function getPointAtDistance(points, targetDist) {
  let accumulatedDist = 0;

  for (let i = 1; i < points.length; i++) {
    const segLen = distance(points[i - 1], points[i]);

    if (accumulatedDist + segLen >= targetDist) {
      const t = (targetDist - accumulatedDist) / segLen;
      return {
        x: points[i - 1].x + t * (points[i].x - points[i - 1].x),
        y: points[i - 1].y + t * (points[i].y - points[i - 1].y)
      };
    }

    accumulatedDist += segLen;
  }

  return points[points.length - 1];
}

function paintStrokeFull(strokePoints){
  if (strokePoints.length < 2) return;
  const r = BR();
  rvX.save();
  rvX.strokeStyle = '#000';
  rvX.fillStyle = '#000';
  rvX.lineWidth = r * 2;
  rvX.lineCap = 'round';
  rvX.lineJoin = 'round';
  rvX.beginPath();
  rvX.moveTo(strokePoints[0].x, strokePoints[0].y);
  for (let i = 1; i < strokePoints.length; i++) {
    rvX.lineTo(strokePoints[i].x, strokePoints[i].y);
  }
  rvX.stroke();
  rvX.restore();
}

/* ── REDRAW TRACE ────────────────────────────────────── */
function redrawTrace(){
  trX.clearRect(0,0,CS,CS);
  if(!letterInkCanvas||!revealCanvas)return;

  if(done[lIdx]){
    trX.save();trX.setTransform(1,0,0,1,0,0);
    trX.drawImage(letterDoneCanvas,0,0);
    trX.restore();
    return;
  }

  const tmp=document.createElement('canvas');
  tmp.width=Math.round(CS*DPR);tmp.height=Math.round(CS*DPR);
  const tx=tmp.getContext('2d');

  tx.drawImage(letterInkCanvas,0,0);
  tx.globalCompositeOperation='destination-in';
  tx.drawImage(revealCanvas,0,0);

  trX.save();trX.setTransform(1,0,0,1,0,0);
  trX.drawImage(tmp,0,0);
  trX.restore();
}

/* ── DRAW BACKGROUND ─────────────────────────────────── */
const INK_C='#1E293B', DONE_C='#15803D', GUIDE_C='#1D4ED8';

function drawBg(char){
  bgX.clearRect(0,0,CS,CS);
  bgX.strokeStyle='#E9ECF6';bgX.lineWidth=1;bgX.setLineDash([3,6]);
  [CS/3,CS*2/3].forEach(v=>{
    bgX.beginPath();bgX.moveTo(v,0);bgX.lineTo(v,CS);bgX.stroke();
    bgX.beginPath();bgX.moveTo(0,v);bgX.lineTo(CS,v);bgX.stroke();
  });
  bgX.setLineDash([]);
  bgX.strokeStyle='#D8DCF0';bgX.lineWidth=1;
  bgX.beginPath();bgX.moveTo(CS/2,0);bgX.lineTo(CS/2,CS);bgX.stroke();
  bgX.beginPath();bgX.moveTo(0,CS/2);bgX.lineTo(CS,CS/2);bgX.stroke();

  bgX.save();bgX.globalAlpha=0.08;
  renderGlyph(bgX,char,INK_C);
  bgX.restore();
}

/* ── DRAW GUIDE ──────────────────────────────────────── */
function drawGuide(){
  guX.clearRect(0,0,CS,CS);
  if(done[lIdx]||sIdx>=normStrokes.length)return;
  const pts=normStrokes[sIdx];
  if(pts.length<2)return;

  // Convert normalized points to screen coordinates
  const screenPts = pts.map(p => ({ x: p.x * CS, y: p.y * CS }));

  // Extract key points for waypoint display
  const keyPoints = extractKeyPoints(screenPts);

  // ── Dotted path line ──
  guX.save();
  guX.setLineDash([4,6]);
  guX.strokeStyle='rgba(29,78,216,0.2)';
  guX.lineWidth=2.5;
  guX.lineCap='round';
  guX.lineJoin='round';
  guX.beginPath();
  guX.moveTo(screenPts[0].x, screenPts[0].y);
  for(let i=1;i<screenPts.length-1;i++){
    const mx=(screenPts[i].x+screenPts[i+1].x)/2;
    const my=(screenPts[i].y+screenPts[i+1].y)/2;
    guX.quadraticCurveTo(screenPts[i].x,screenPts[i].y,mx,my);
  }
  guX.lineTo(screenPts[screenPts.length-1].x,screenPts[screenPts.length-1].y);
  guX.stroke();
  guX.restore();

  // ── Key point markers ──
  const dotR = Math.max(8, CS * 0.02);
  const fontSize = Math.max(9, CS * 0.025);

  keyPoints.forEach((kp, n) => {
    const p = kp.point;
    const reached = getDistanceAtPoint(screenPts, kp.index) < currentProgress;

    // Determine if this is the current target
    const isCurrent = !reached && n === 0;
    const nextUnreachedIndex = keyPoints.findIndex(kp => getDistanceAtPoint(screenPts, kp.index) >= currentProgress);
    const isNextTarget = n === nextUnreachedIndex;

    // Outer glow for current target
    if (isNextTarget) {
      guX.beginPath();
      guX.arc(p.x, p.y, dotR + 5, 0, Math.PI * 2);
      guX.fillStyle = 'rgba(29,78,216,0.15)';
      guX.fill();
    }

    // Dot fill
    guX.beginPath();
    guX.arc(p.x, p.y, dotR, 0, Math.PI * 2);
    if (reached) {
      guX.fillStyle = 'rgba(21,128,61,0.85)';
    } else if (isNextTarget) {
      guX.fillStyle = GUIDE_C;
    } else {
      guX.fillStyle = 'rgba(29,78,216,0.4)';
    }
    guX.fill();

    // White border
    guX.beginPath();
    guX.arc(p.x, p.y, dotR, 0, Math.PI * 2);
    guX.strokeStyle = 'rgba(255,255,255,0.9)';
    guX.lineWidth = 1.5;
    guX.stroke();

    // Number label
    guX.save();
    guX.font = `700 ${fontSize}px "DM Sans", sans-serif`;
    guX.textAlign = 'center';
    guX.textBaseline = 'middle';
    guX.fillStyle = '#fff';
    guX.fillText(String(n + 1), p.x, p.y + 0.5);
    guX.restore();
  });

  // ── Current target position indicator ──
  if (currentProgress < strokeTotalLength) {
    const targetPoint = getPointAtDistance(screenPts, currentProgress);
    if (targetPoint) {
      guX.beginPath();
      guX.arc(targetPoint.x, targetPoint.y, CS * 0.014, 0, Math.PI * 2);
      guX.fillStyle = isOffPath ? '#DC2626' : GUIDE_C;
      guX.fill();
      guX.beginPath();
      guX.arc(targetPoint.x, targetPoint.y, CS * 0.014, 0, Math.PI * 2);
      guX.strokeStyle = 'rgba(255,255,255,0.8)';
      guX.lineWidth = 2;
      guX.stroke();
    }
  }

  // ── Progress bar ──
  const progressRatio = currentProgress / strokeTotalLength;
  const barWidth = CS * 0.6;
  const barHeight = 4;
  const barX = (CS - barWidth) / 2;
  const barY = CS - 20;

  guX.fillStyle = 'rgba(0,0,0,0.1)';
  guX.fillRect(barX, barY, barWidth, barHeight);

  guX.fillStyle = isOffPath ? '#DC2626' : GUIDE_C;
  guX.fillRect(barX, barY, barWidth * progressRatio, barHeight);
}

/* ── LOAD LETTER ─────────────────────────────────────── */
function loadLetter(idx){
  lIdx=idx;
  sIdx=0;
  currentProgress=0;
  isDown=false;
  isOffPath=false;
  const l=letters[idx];
  setupCanvas();

  // Store normalized strokes directly
  normStrokes = l.strokes.map(s => s.points || []);

  // Calculate initial stroke length
  if (normStrokes.length > 0) {
    const screenPts = normStrokes[0].map(p => ({ x: p.x * CS, y: p.y * CS }));
    strokeTotalLength = getStrokeLength(screenPts);
  } else {
    strokeTotalLength = 0;
  }

  // Set tolerance
  tolerance = CS * CONFIG.TOLERANCE_RATIO;

  buildLetterCanvases(l.char);
  initRevealCanvas();
  drawBg(l.char);

  if(done[lIdx]){
    normStrokes.forEach(pts=>{
      const screenPts=pts.map(p=>({x:p.x*CS,y:p.y*CS}));
      paintStrokeFull(screenPts);
    });
  }

  redrawTrace();
  drawGuide();
  updateInfoBar();
  updateHint();
  updateControls();
  updateStrip();

  const btn=document.getElementById(`ls-${idx}`);
  if(btn)btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

/* ── POINTER ─────────────────────────────────────────── */
function getPos(e){
  const r=wrap.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*(CS/r.width),y:(src.clientY-r.top)*(CS/r.height)};
}

function onMove(pos){
  if(!isDown||done[lIdx]||sIdx>=normStrokes.length)return;

  const pts = normStrokes[sIdx];
  const screenPts = pts.map(p => ({ x: p.x * CS, y: p.y * CS }));

  // Find closest point on stroke path
  const closest = findClosestPointOnPath(screenPts, pos);
  const distToPath = closest.distance;

  // Check if within tolerance
  isOffPath = distToPath > tolerance;

  if (!isOffPath) {
    // Calculate distance along the stroke to this point
    const distAlong = getDistanceAtPoint(screenPts, closest.index) +
                      distance(screenPts[closest.index], closest.point);

    // Only advance if we're moving forward
    if (distAlong > currentProgress) {
      const prevProgress = currentProgress;
      currentProgress = Math.min(distAlong, strokeTotalLength);

      // Paint the new segment
      paintRevealFromProgress(screenPts, prevProgress, currentProgress);
      redrawTrace();
      drawGuide();
      updateInfoBar();

      // Check if stroke complete
      if (currentProgress >= strokeTotalLength * 0.98) {
        sIdx++;
        currentProgress = 0;

        if (sIdx >= normStrokes.length) {
          done[lIdx] = true;
          normStrokes.forEach(p => {
            const sp = p.map(pt => ({ x: pt.x * CS, y: pt.y * CS }));
            paintStrokeFull(sp);
          });
          redrawTrace();
          guX.clearRect(0, 0, CS, CS);
          updateStrip();
        } else {
          // Set up next stroke
          const nextScreenPts = normStrokes[sIdx].map(p => ({ x: p.x * CS, y: p.y * CS }));
          strokeTotalLength = getStrokeLength(nextScreenPts);
        }

        drawGuide();
        updateInfoBar();
        updateHint();
        updateControls();
      }
    }
  } else {
    // Off path - update guide to show error
    drawGuide();
  }
}

guC.addEventListener('pointerdown',e=>{
  e.preventDefault();
  guC.setPointerCapture(e.pointerId);
  isDown=true;
  onMove(getPos(e));
});
guC.addEventListener('pointermove',e=>{
  e.preventDefault();
  onMove(getPos(e));
});
guC.addEventListener('pointerup',()=>{isDown=false;});
guC.addEventListener('pointercancel',()=>{isDown=false;});

/* ── NAV ─────────────────────────────────────────────── */
function prevLetter(){if(lIdx>0)loadLetter(lIdx-1);}
function nextLetter(){if(lIdx<letters.length-1)loadLetter(lIdx+1);}
function resetLetter(){done[lIdx]=false;loadLetter(lIdx);}

/* ── UI ──────────────────────────────────────────────── */
function buildStrip(){
  const s=document.getElementById('letterStrip');s.innerHTML='';
  letters.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='ls-btn';b.textContent=l.char;b.title=l.name;b.id=`ls-${i}`;
    b.onclick=()=>loadLetter(i);s.appendChild(b);
  });
}

function updateStrip(){
  letters.forEach((_,i)=>{
    const b=document.getElementById(`ls-${i}`);if(!b)return;
    b.className='ls-btn'+(i===lIdx?' active':'')+(done[i]?' done':'');
  });
}

function updateInfoBar(){
  const l=letters[lIdx],ns=normStrokes.length,si=Math.min(sIdx,ns-1),isDone=done[lIdx];
  document.getElementById('ibChar').textContent=l.char;
  document.getElementById('ibName').textContent=l.name;
  document.getElementById('ibDesc').textContent=l.desc||('Consonant '+(lIdx+1));
  const chip=document.getElementById('strokeChip');
  chip.textContent=isDone?'Complete ✓':`Stroke ${si+1} of ${ns}`;
  chip.className='stroke-chip'+(isDone?' done-chip':'');
  const dots=document.getElementById('strokeDots');dots.innerHTML='';
  for(let i=0;i<ns;i++){
    const d=document.createElement('div');
    d.className='sdot'+(isDone||i<sIdx?' complete':(i===sIdx?' active':''));
    dots.appendChild(d);
  }
}

function updateHint(){
  const el=document.getElementById('hint');
  if(done[lIdx]){
    el.textContent='✓ Letter complete! Tap "Next →" to continue.';
    el.className='hint done';
  } else if(isOffPath){
    el.textContent='⚠️ Stay on the dotted path — you went off track!';
    el.className='hint active';
    el.style.color='#DC2626';
    el.style.borderColor='#FECACA';
    el.style.backgroundColor='#FEF2F2';
  } else{
    const progress = Math.round((currentProgress / strokeTotalLength) * 100);
    el.textContent=`Trace stroke ${sIdx+1} of ${normStrokes.length} — follow the numbered waypoints (${progress}%)`;
    el.className='hint active';
    el.style.color='';
    el.style.borderColor='';
    el.style.backgroundColor='';
  }
}

function updateControls(){
  document.getElementById('btnPrev').disabled=lIdx===0;
  document.getElementById('btnNext').disabled=lIdx===letters.length-1;
  const n=document.getElementById('btnNext');
  n.className=done[lIdx]&&lIdx<letters.length-1?'btn-c success':'btn-c dark';
}

let _rt;
window.addEventListener('resize',()=>{
  clearTimeout(_rt);
  _rt=setTimeout(()=>{if(letters.length)loadLetter(lIdx);},150);
});
</script>

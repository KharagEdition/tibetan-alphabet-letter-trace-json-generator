<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tibetan Letter Tracer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@500&family=Noto+Serif+Tibetan:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F3F5FA;
  --surface:   #FFFFFF;
  --border:    #E2E7F0;
  --text-1:    #111827;
  --text-2:    #4B5563;
  --text-3:    #9CA3AF;
  --accent:    #2563EB;
  --accent-lt: #EFF6FF;
  --green:     #15803D;
  --green-lt:  #F0FDF4;
  --red:       #DC2626;
  --red-lt:    #FEF2F2;
  --ink:       #0F172A;
  --radius:    14px;
  --shadow:    0 2px 14px rgba(0,0,0,0.07);
  --canvas-size: min(440px, calc(100vw - 32px));
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); min-height: 100vh; color: var(--text-1);
  touch-action: none; user-select: none; -webkit-user-select: none;
  display: flex; flex-direction: column;
}

/* ── Top bar ── */
.topbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 18px; display: flex; align-items: center;
  justify-content: space-between; gap: 10px; position: sticky; top: 0; z-index: 50;
}
.topbar-brand { display: flex; align-items: center; gap: 9px; }
.topbar-logo {
  width: 32px; height: 32px; background: var(--ink); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Tibetan', serif; color: #fff; font-size: 0.95rem; flex-shrink: 0;
}
.topbar h1 { font-size: 0.88rem; font-weight: 700; line-height: 1.2; }
.topbar h1 small { display: block; font-size: 0.7rem; font-weight: 400; color: var(--text-3); }
.btn-sm {
  padding: 5px 13px; border-radius: 7px; border: 1.5px solid var(--border);
  background: var(--surface); font-family: 'DM Sans', sans-serif;
  font-size: 0.73rem; font-weight: 700; color: var(--text-2); cursor: pointer;
  white-space: nowrap; transition: border-color 0.1s, color 0.1s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

/* ── Paste Screen ── */
#screenPaste {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 28px 18px; gap: 16px;
}
.paste-card {
  background: var(--surface); border-radius: 18px; border: 1px solid var(--border);
  box-shadow: var(--shadow); padding: 26px 22px; width: 100%; max-width: 460px;
  display: flex; flex-direction: column; gap: 14px;
}
.paste-card h2 { font-size: 1.05rem; font-weight: 700; }
.paste-card p  { font-size: 0.8rem; color: var(--text-2); line-height: 1.6; }
.paste-card p strong { color: var(--text-1); }
textarea#jsonInput {
  width: 100%; min-height: 170px; resize: vertical;
  font-family: 'DM Mono', monospace; font-size: 0.67rem;
  padding: 11px 13px; border: 1.5px solid var(--border); border-radius: 9px;
  background: #F8FAFC; color: var(--text-1); outline: none;
  line-height: 1.5; transition: border-color 0.15s;
}
textarea#jsonInput:focus { border-color: var(--accent); }
.paste-error {
  font-size: 0.76rem; color: var(--red); font-weight: 600;
  display: none; padding: 8px 12px; background: var(--red-lt);
  border-radius: 8px; border: 1px solid #FECACA;
}
.btn-primary {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  background: var(--ink); color: white; font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.12s;
}
.btn-primary:hover { background: #1E293B; }

/* ── Trace Screen ── */
#screenTrace {
  display: none; flex: 1; flex-direction: column; align-items: center;
  padding: 14px 14px 28px; gap: 10px;
  max-width: 520px; margin: 0 auto; width: 100%;
}

/* ── Letter Strip ── */
.strip-wrap { width: 100%; overflow-x: auto; scrollbar-width: none; }
.strip-wrap::-webkit-scrollbar { display: none; }
.letter-strip { display: flex; gap: 4px; padding: 2px 0; width: max-content; }
.ls-btn {
  width: 34px; height: 34px; border-radius: 7px;
  border: 1.5px solid var(--border); background: var(--surface);
  font-family: 'Noto Serif Tibetan', serif; font-size: 0.9rem; color: var(--text-2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: border-color 0.1s, background 0.1s; position: relative;
}
.ls-btn:hover { border-color: var(--accent); background: var(--accent-lt); }
.ls-btn.active { border-color: var(--ink); background: var(--ink); color: white; }
.ls-btn.done   { border-color: var(--green); background: var(--green-lt); color: var(--green); }
.ls-btn.done::after {
  content: ''; position: absolute; top: -3px; right: -3px;
  width: 7px; height: 7px; background: var(--green); border-radius: 50%;
  border: 1.5px solid var(--bg);
}

/* ── Info Bar ── */
.info-bar {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 13px; padding: 10px 14px;
  display: flex; align-items: center; gap: 11px; box-shadow: var(--shadow);
}
.ib-char {
  font-family: 'Noto Serif Tibetan', serif; font-size: 1.7rem;
  width: 46px; height: 46px; background: var(--bg); border-radius: 9px;
  border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; line-height: 1;
}
.ib-meta { flex: 1; min-width: 0; }
.ib-meta h2 { font-size: 0.92rem; font-weight: 700; }
.ib-meta p  { font-size: 0.7rem; color: var(--text-3); margin-top: 1px; }
.ib-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.stroke-pill {
  font-size: 0.68rem; font-weight: 700; color: white;
  padding: 3px 9px; border-radius: 99px; white-space: nowrap;
  background: var(--accent);
}
.stroke-pill.done  { background: var(--green); }
.stroke-dots { display: flex; gap: 3px; }
.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
.sdot.active   { background: var(--accent); transform: scale(1.3); }
.sdot.complete { background: var(--green); }

/* ── Canvas ── */
.canvas-wrap {
  position: relative; width: var(--canvas-size); height: var(--canvas-size);
  border-radius: 16px; border: 1.5px solid var(--border); background: #FAFBFF;
  touch-action: none; cursor: crosshair; overflow: hidden;
  box-shadow: var(--shadow); flex-shrink: 0;
}
.canvas-wrap canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}

/* ── Hint ── */
.hint {
  width: 100%; font-size: 0.76rem; font-weight: 500; color: var(--text-2);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 13px; text-align: center; line-height: 1.5;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.hint.active { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); font-weight: 600; }
.hint.error  { border-color: #FECACA; background: var(--red-lt); color: var(--red); font-weight: 600; }
.hint.done   { border-color: #BBF7D0; background: var(--green-lt); color: var(--green); font-weight: 700; }

/* ── Controls ── */
.controls { display: flex; gap: 7px; width: 100%; }
.btn-c {
  flex: 1; padding: 10px 7px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--surface);
  font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 700;
  color: var(--text-2); cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 4px;
  transition: border-color 0.1s, background 0.1s, color 0.1s;
}
.btn-c:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); }
.btn-c.ink  { background: var(--ink); border-color: var(--ink); color: white; }
.btn-c.ink:hover:not(:disabled) { background: #1E293B; border-color: #1E293B; }
.btn-c.ok   { background: var(--green); border-color: var(--green); color: white; }
.btn-c.ok:hover:not(:disabled) { background: #166534; }
.btn-c:disabled { opacity: 0.32; pointer-events: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">ཀ</div>
    <h1>Tibetan Tracer <small>Stroke-by-stroke practice</small></h1>
  </div>
  <button class="btn-sm" onclick="showPaste()">⇪ Load JSON</button>
</div>

<!-- Paste Screen -->
<div id="screenPaste">
  <div class="paste-card">
    <h2>Load stroke data</h2>
    <p>Export JSON from the <strong>Stroke Recorder</strong>, then paste it below to begin tracing practice.</p>
    <textarea id="jsonInput" placeholder="Paste recorder JSON here…"></textarea>
    <div class="paste-error" id="pasteError"></div>
    <button class="btn-primary" onclick="loadJSON()">Load Letters →</button>
  </div>
</div>

<!-- Trace Screen -->
<div id="screenTrace">
  <div class="strip-wrap"><div class="letter-strip" id="letterStrip"></div></div>

  <div class="info-bar">
    <div class="ib-char" id="ibChar">ཀ</div>
    <div class="ib-meta">
      <h2 id="ibName">Ka</h2>
      <p  id="ibDesc">1st consonant</p>
    </div>
    <div class="ib-right">
      <div class="stroke-pill" id="strokePill">Stroke 1 of 1</div>
      <div class="stroke-dots" id="strokeDots"></div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <!-- layer order: bg → done strokes → live stroke → guide/pointer (top) -->
    <canvas id="cBg"></canvas>
    <canvas id="cDone"></canvas>
    <canvas id="cLive"></canvas>
    <canvas id="cGuide"></canvas>
  </div>

  <div class="hint" id="hint">Follow the numbered waypoints</div>

  <div class="controls">
    <button class="btn-c"     id="btnPrev"  onclick="prevLetter()">← Prev</button>
    <button class="btn-c"     id="btnRetry" onclick="retryLetter()">↺ Retry</button>
    <button class="btn-c ink" id="btnNext"  onclick="nextLetter()">Next →</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════════════════ */
const CFG = {
  SNAP_RATIO:        0.09,          // fraction of CS — max distance to count as on-path
  COMPLETION_THRESH: 0.96,          // fraction of arc needed to complete stroke
  STROKE_WIDTH:      0.022,         // fraction of CS
  GUIDE_DASH:        [5, 9],
  GUIDE_WIDTH:       0.014,
  DOT_RADIUS:        0.023,
  CURSOR_RADIUS:     0.014,
  ANGLE_THRESH:      Math.PI / 4,   // ~45° — corner detection
  MIN_WP_FRAC:       0.12,          // min spacing between waypoints as fraction of total arc
};

/* ══════════════════════════════════════════════════════════
   GEOMETRY
══════════════════════════════════════════════════════════ */
function ptDist(a, b) {
  return Math.sqrt((b.x - a.x) ** 2 + (b.y - a.y) ** 2);
}

function arcLength(poly) {
  let d = 0;
  for (let i = 1; i < poly.length; i++) d += ptDist(poly[i-1], poly[i]);
  return d;
}

function arcLengthUpTo(poly, idx) {
  let d = 0;
  for (let i = 1; i <= idx && i < poly.length; i++) d += ptDist(poly[i-1], poly[i]);
  return d;
}

// Sub-polyline from start up to targetArc distance
function subPolyUpToArc(poly, targetArc) {
  if (targetArc <= 0) return [poly[0]];
  const out = [poly[0]];
  let acc = 0;
  for (let i = 1; i < poly.length; i++) {
    const seg = ptDist(poly[i-1], poly[i]);
    if (acc + seg >= targetArc) {
      const t = (targetArc - acc) / seg;
      out.push({
        x: poly[i-1].x + t * (poly[i].x - poly[i-1].x),
        y: poly[i-1].y + t * (poly[i].y - poly[i-1].y),
      });
      return out;
    }
    out.push(poly[i]);
    acc += seg;
  }
  return out;
}

// Point exactly at arc distance
function pointAtArc(poly, target) {
  let acc = 0;
  for (let i = 1; i < poly.length; i++) {
    const seg = ptDist(poly[i-1], poly[i]);
    if (acc + seg >= target) {
      const t = (target - acc) / seg;
      return { x: poly[i-1].x + t * (poly[i].x - poly[i-1].x),
               y: poly[i-1].y + t * (poly[i].y - poly[i-1].y) };
    }
    acc += seg;
  }
  return poly[poly.length - 1];
}

// Closest projected point on polyline to p
function closestOnPoly(poly, p) {
  let best = { dist: Infinity, arc: 0, pt: poly[0] };
  let arcAcc = 0;
  for (let i = 0; i < poly.length - 1; i++) {
    const A = poly[i], B = poly[i+1];
    const dx = B.x - A.x, dy = B.y - A.y;
    const len2 = dx*dx + dy*dy;
    let t = 0;
    if (len2 > 0) t = Math.max(0, Math.min(1, ((p.x-A.x)*dx + (p.y-A.y)*dy) / len2));
    const proj = { x: A.x + t*dx, y: A.y + t*dy };
    const d = ptDist(p, proj);
    if (d < best.dist) best = { dist: d, arc: arcAcc + t * Math.sqrt(len2), pt: proj };
    arcAcc += Math.sqrt(len2);
  }
  // Check last point too
  const dLast = ptDist(p, poly[poly.length-1]);
  if (dLast < best.dist) best = { dist: dLast, arc: arcAcc, pt: poly[poly.length-1] };
  return best;
}

// Pick meaningful waypoints: start + corners + end, spaced at least MIN_WP_FRAC apart
function buildWaypoints(poly) {
  const total  = arcLength(poly);
  const minGap = total * CFG.MIN_WP_FRAC;
  const result = [{ idx: 0, arc: 0 }];
  let lastArc  = 0, acc = 0;

  for (let i = 1; i < poly.length - 1; i++) {
    acc += ptDist(poly[i-1], poly[i]);
    if (acc - lastArc < minGap) continue;
    // Corner detection
    const prev = poly[i-1], cur = poly[i], next = poly[i+1];
    const v1 = { x: prev.x - cur.x, y: prev.y - cur.y };
    const v2 = { x: next.x - cur.x, y: next.y - cur.y };
    const cross = Math.abs(v1.x * v2.y - v1.y * v2.x);
    const dot   = v1.x * v2.x + v1.y * v2.y;
    const angle = Math.atan2(cross, dot);
    if (angle > CFG.ANGLE_THRESH) {
      result.push({ idx: i, arc: acc });
      lastArc = acc;
    }
  }
  result.push({ idx: poly.length - 1, arc: total });
  return result;
}

/* ══════════════════════════════════════════════════════════
   CANVAS SETUP
══════════════════════════════════════════════════════════ */
const wrapEl = document.getElementById('canvasWrap');
const cBg    = document.getElementById('cBg');
const cDone  = document.getElementById('cDone');
const cLive  = document.getElementById('cLive');
const cGuide = document.getElementById('cGuide');
let xBg, xDone, xLive, xGuide, CS, DPR;

function setupCanvases() {
  DPR = window.devicePixelRatio || 1;
  CS  = wrapEl.getBoundingClientRect().width;
  [cBg, cDone, cLive, cGuide].forEach(c => {
    c.width  = Math.round(CS * DPR);
    c.height = Math.round(CS * DPR);
    c.style.width  = CS + 'px';
    c.style.height = CS + 'px';
  });
  xBg    = cBg.getContext('2d');    xBg.scale(DPR, DPR);
  xDone  = cDone.getContext('2d');  xDone.scale(DPR, DPR);
  xLive  = cLive.getContext('2d');  xLive.scale(DPR, DPR);
  xGuide = cGuide.getContext('2d'); xGuide.scale(DPR, DPR);
}

function getPointerPos(e) {
  const r   = wrapEl.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - r.left) * (CS / r.width),
    y: (src.clientY - r.top)  * (CS / r.height),
  };
}

/* ══════════════════════════════════════════════════════════
   DRAW HELPERS
══════════════════════════════════════════════════════════ */
// Smooth bezier through points
function drawSmoothPath(ctx, pts) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  if (pts.length === 2) {
    ctx.lineTo(pts[1].x, pts[1].y);
  } else {
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i].x + pts[i+1].x) / 2;
      const my = (pts[i].y + pts[i+1].y) / 2;
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
    }
    ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  }
}

/* ══════════════════════════════════════════════════════════
   RENDER LAYERS
══════════════════════════════════════════════════════════ */
function renderBg(char) {
  xBg.clearRect(0, 0, CS, CS);
  // Grid lines
  xBg.strokeStyle = '#E9ECF6'; xBg.lineWidth = 1; xBg.setLineDash([3,6]);
  [CS/3, CS*2/3].forEach(v => {
    xBg.beginPath(); xBg.moveTo(v, 0); xBg.lineTo(v, CS); xBg.stroke();
    xBg.beginPath(); xBg.moveTo(0, v); xBg.lineTo(CS, v); xBg.stroke();
  });
  xBg.setLineDash([]);
  xBg.strokeStyle = '#D1D8EE'; xBg.lineWidth = 1;
  xBg.beginPath(); xBg.moveTo(CS/2, 0); xBg.lineTo(CS/2, CS); xBg.stroke();
  xBg.beginPath(); xBg.moveTo(0, CS/2); xBg.lineTo(CS, CS/2); xBg.stroke();
  // Ghost glyph
  const fs = Math.round(CS * 0.60);
  xBg.font = `700 ${fs}px "Noto Serif Tibetan", serif`;
  xBg.textAlign = 'center'; xBg.textBaseline = 'alphabetic';
  const m  = xBg.measureText(char);
  const th = m.actualBoundingBoxAscent + m.actualBoundingBoxDescent;
  xBg.fillStyle = 'rgba(59,92,229,0.07)';
  xBg.fillText(char, CS/2, CS/2 + m.actualBoundingBoxAscent - th/2);
}

// Render all fully-completed strokes in green
function renderDone() {
  xDone.clearRect(0, 0, CS, CS);
  const sw = CS * CFG.STROKE_WIDTH;
  completedStrokes.forEach(poly => {
    xDone.save();
    xDone.strokeStyle = '#15803D';
    xDone.lineWidth   = sw;
    xDone.lineCap     = 'round';
    xDone.lineJoin    = 'round';
    drawSmoothPath(xDone, poly);
    xDone.stroke();
    // Round cap at start
    xDone.beginPath();
    xDone.arc(poly[0].x, poly[0].y, sw/2, 0, Math.PI*2);
    xDone.fillStyle = '#15803D';
    xDone.fill();
    xDone.restore();
  });
}

// Render the live in-progress stroke (dark ink, grows from start)
function renderLive() {
  xLive.clearRect(0, 0, CS, CS);
  if (!activePoly || currentArc <= 0) return;
  const sub = subPolyUpToArc(activePoly, currentArc);
  if (sub.length < 2) return;
  const sw = CS * CFG.STROKE_WIDTH;
  xLive.save();
  xLive.strokeStyle = '#0F172A';
  xLive.lineWidth   = sw;
  xLive.lineCap     = 'round';
  xLive.lineJoin    = 'round';
  drawSmoothPath(xLive, sub);
  xLive.stroke();
  xLive.beginPath();
  xLive.arc(sub[0].x, sub[0].y, sw/2, 0, Math.PI*2);
  xLive.fillStyle = '#0F172A';
  xLive.fill();
  xLive.restore();
}

// Render guide overlay: dotted path + numbered waypoints + moving cursor
function renderGuide() {
  xGuide.clearRect(0, 0, CS, CS);
  if (letterDone || !activePoly) return;

  const poly  = activePoly;
  const total = totalArc;
  const dR    = CS * CFG.DOT_RADIUS;
  const cR    = CS * CFG.CURSOR_RADIUS;
  const gw    = CS * CFG.GUIDE_WIDTH;
  const fSz   = Math.max(9, dR * 0.88);

  // Dotted guide path — full stroke (always visible as reference)
  xGuide.save();
  xGuide.setLineDash(CFG.GUIDE_DASH);
  xGuide.strokeStyle = 'rgba(37,99,235,0.20)';
  xGuide.lineWidth   = gw;
  xGuide.lineCap     = 'round';
  xGuide.lineJoin    = 'round';
  drawSmoothPath(xGuide, poly);
  xGuide.stroke();
  xGuide.restore();

  // Waypoints
  waypoints.forEach((wp, n) => {
    const p       = poly[Math.min(wp.idx, poly.length-1)];
    const reached = wp.arc <= currentArc + 2;  // +2px tolerance
    const isNext  = !reached && (n === 0 || waypoints[n-1].arc <= currentArc + 2);

    // Glow ring for next target
    if (isNext) {
      xGuide.beginPath();
      xGuide.arc(p.x, p.y, dR + 6, 0, Math.PI*2);
      xGuide.fillStyle = 'rgba(37,99,235,0.12)';
      xGuide.fill();
    }
    // Dot fill
    xGuide.beginPath();
    xGuide.arc(p.x, p.y, dR, 0, Math.PI*2);
    xGuide.fillStyle = reached
      ? '#15803D'
      : isNext
        ? '#2563EB'
        : 'rgba(37,99,235,0.35)';
    xGuide.fill();
    // White ring
    xGuide.strokeStyle = 'rgba(255,255,255,0.9)';
    xGuide.lineWidth   = 1.8;
    xGuide.stroke();
    // Number label
    xGuide.save();
    xGuide.font         = `700 ${fSz}px "DM Sans", sans-serif`;
    xGuide.textAlign    = 'center';
    xGuide.textBaseline = 'middle';
    xGuide.fillStyle    = '#fff';
    xGuide.fillText(String(n+1), p.x, p.y + 0.5);
    xGuide.restore();
  });

  // Moving cursor at leading edge of traced arc
  if (currentArc < total) {
    const tip   = pointAtArc(poly, currentArc);
    const color = isOffPath ? '#DC2626' : '#2563EB';
    // Outer ring
    xGuide.beginPath();
    xGuide.arc(tip.x, tip.y, cR + 3.5, 0, Math.PI*2);
    xGuide.fillStyle = isOffPath ? 'rgba(220,38,38,0.14)' : 'rgba(37,99,235,0.13)';
    xGuide.fill();
    // Inner dot
    xGuide.beginPath();
    xGuide.arc(tip.x, tip.y, cR, 0, Math.PI*2);
    xGuide.fillStyle   = color;
    xGuide.fill();
    xGuide.strokeStyle = 'rgba(255,255,255,0.9)';
    xGuide.lineWidth   = 1.5;
    xGuide.stroke();
  }

  // Progress bar at bottom
  const bW   = CS * 0.55, bH = 3.5;
  const bX   = (CS - bW) / 2, bY = CS - 14;
  const prog = total > 0 ? Math.min(currentArc / total, 1) : 0;
  xGuide.fillStyle = 'rgba(0,0,0,0.07)';
  xGuide.beginPath(); xGuide.roundRect(bX, bY, bW, bH, 2); xGuide.fill();
  xGuide.fillStyle = isOffPath ? '#DC2626' : '#2563EB';
  xGuide.beginPath(); xGuide.roundRect(bX, bY, bW * prog, bH, 2); xGuide.fill();
}

/* ══════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════ */
let letters          = [];
let lIdx             = 0;
let sIdx             = 0;
let completedStrokes = [];   // scaled polys of finished strokes this letter
let activePoly       = null; // current stroke poly (scaled to CS)
let waypoints        = [];   // [{idx, arc}]
let currentArc       = 0;
let totalArc         = 0;
let isOffPath        = false;
let isDown           = false;
let letterDone       = false;
const doneLetter     = {};

/* ══════════════════════════════════════════════════════════
   JSON LOADING
══════════════════════════════════════════════════════════ */
function extractStrokes(letterData) {
  const raw = letterData.strokes;
  if (!Array.isArray(raw) || raw.length === 0) return [];
  return raw.map(stroke => {
    const pts = Array.isArray(stroke) ? stroke : (stroke.points || []);
    return pts.filter(p => typeof p.x === 'number' && typeof p.y === 'number');
  }).filter(pts => pts.length >= 2);
}

function loadJSON() {
  const raw   = document.getElementById('jsonInput').value.trim();
  const errEl = document.getElementById('pasteError');
  errEl.style.display = 'none';
  if (!raw) { showErr('Please paste your JSON data.'); return; }

  let parsed;
  try { parsed = JSON.parse(raw); }
  catch(e) { showErr('Invalid JSON — check for syntax errors.'); return; }

  letters = [];

  // v1.0 / v2.0 — both use parsed.letters
  if (parsed.letters && typeof parsed.letters === 'object') {
    Object.entries(parsed.letters).forEach(([char, data]) => {
      const strokes = extractStrokes(data);
      if (strokes.length)
        letters.push({ char, name: data.name || char, desc: data.desc || '', index: data.index || 0, strokes });
    });
  }
  // Legacy array
  else if (Array.isArray(parsed)) {
    parsed.forEach((l, i) => {
      if (!l.char) return;
      const strokes = extractStrokes(l);
      if (strokes.length)
        letters.push({ char: l.char, name: l.name || l.char, desc: '', index: l.index || i, strokes });
    });
  }
  // Legacy flat object
  else {
    Object.entries(parsed).forEach(([char, v], i) => {
      if (!v || !v.strokes) return;
      const strokes = extractStrokes(v);
      if (strokes.length)
        letters.push({ char, name: v.name || char, desc: '', index: v.index || i, strokes });
    });
  }

  letters.sort((a, b) => a.index - b.index);
  if (!letters.length) {
    showErr('No valid letter data found. Export from the Stroke Recorder with at least one saved letter.');
    return;
  }
  lIdx = 0;
  showTrace();
}

function showErr(msg) {
  const el = document.getElementById('pasteError');
  el.textContent = msg; el.style.display = 'block';
}
function showPaste() {
  document.getElementById('screenPaste').style.display = 'flex';
  document.getElementById('screenTrace').style.display = 'none';
}
function showTrace() {
  document.getElementById('screenPaste').style.display = 'none';
  document.getElementById('screenTrace').style.display = 'flex';
  buildStrip();
  loadLetter(0);
}

/* ══════════════════════════════════════════════════════════
   LETTER / STROKE LOADING
══════════════════════════════════════════════════════════ */
function scalePoly(normPts) {
  return normPts.map(p => ({ x: p.x * CS, y: p.y * CS }));
}

function loadLetter(idx) {
  lIdx             = idx;
  letterDone       = false;
  completedStrokes = [];
  isDown           = false;
  setupCanvases();
  renderBg(letters[idx].char);
  xDone.clearRect(0, 0, CS, CS);
  loadStroke(0);
  updateUI();
  updateStrip();
  const btn = document.getElementById(`ls-${idx}`);
  if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function loadStroke(si) {
  sIdx       = si;
  currentArc = 0;
  isOffPath  = false;
  isDown     = false;
  activePoly = scalePoly(letters[lIdx].strokes[si]);
  totalArc   = arcLength(activePoly);
  waypoints  = buildWaypoints(activePoly);
  xLive.clearRect(0, 0, CS, CS);
  renderLive();
  renderGuide();
  updateUI();
}

/* ══════════════════════════════════════════════════════════
   POINTER HANDLING
══════════════════════════════════════════════════════════ */
cGuide.addEventListener('pointerdown', e => {
  e.preventDefault();
  cGuide.setPointerCapture(e.pointerId);
  isDown = true;
  handleMove(getPointerPos(e));
});
cGuide.addEventListener('pointermove', e => {
  e.preventDefault();
  if (isDown) handleMove(getPointerPos(e));
});
cGuide.addEventListener('pointerup',     () => { isDown = false; });
cGuide.addEventListener('pointercancel', () => { isDown = false; });

function handleMove(pos) {
  if (letterDone || !activePoly) return;
  const snapDist = CS * CFG.SNAP_RATIO;
  const closest  = closestOnPoly(activePoly, pos);
  isOffPath      = closest.dist > snapDist;

  if (!isOffPath && closest.arc > currentArc) {
    currentArc = Math.min(closest.arc, totalArc);
    renderLive();
    renderGuide();
    updateHintProgress();
    if (currentArc >= totalArc * CFG.COMPLETION_THRESH) {
      finishStroke();
    }
  } else {
    renderGuide();  // redraw for off-path cursor colour
    if (isOffPath) updateHintOffPath();
  }
}

function finishStroke() {
  // Snap to full length, render complete
  currentArc = totalArc;
  renderLive();
  // Move to done layer
  completedStrokes.push(activePoly);
  renderDone();
  xLive.clearRect(0, 0, CS, CS);

  const total = letters[lIdx].strokes.length;
  if (sIdx + 1 < total) {
    loadStroke(sIdx + 1);
  } else {
    letterDone       = true;
    doneLetter[lIdx] = true;
    activePoly       = null;
    xGuide.clearRect(0, 0, CS, CS);
    updateUI();
    updateStrip();
  }
}

/* ══════════════════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════════════════ */
function prevLetter()  { if (lIdx > 0)                  loadLetter(lIdx - 1); }
function nextLetter()  { if (lIdx < letters.length - 1) loadLetter(lIdx + 1); }
function retryLetter() { loadLetter(lIdx); }

/* ══════════════════════════════════════════════════════════
   UI
══════════════════════════════════════════════════════════ */
function buildStrip() {
  const s = document.getElementById('letterStrip');
  s.innerHTML = '';
  letters.forEach((l, i) => {
    const b = document.createElement('button');
    b.className = 'ls-btn'; b.textContent = l.char; b.title = l.name; b.id = `ls-${i}`;
    b.onclick = () => loadLetter(i);
    s.appendChild(b);
  });
}

function updateStrip() {
  letters.forEach((_, i) => {
    const b = document.getElementById(`ls-${i}`);
    if (!b) return;
    b.className = 'ls-btn'
      + (i === lIdx    ? ' active' : '')
      + (doneLetter[i] ? ' done'   : '');
  });
}

function updateUI() {
  const l  = letters[lIdx];
  const ns = l.strokes.length;
  document.getElementById('ibChar').textContent = l.char;
  document.getElementById('ibName').textContent = l.name;
  document.getElementById('ibDesc').textContent = l.desc || `Consonant ${lIdx + 1}`;

  const pill = document.getElementById('strokePill');
  if (letterDone) {
    pill.textContent = '✓ Complete';
    pill.className   = 'stroke-pill done';
  } else {
    pill.textContent = `Stroke ${sIdx + 1} of ${ns}`;
    pill.className   = 'stroke-pill';
  }

  const dots = document.getElementById('strokeDots');
  dots.innerHTML = '';
  for (let i = 0; i < ns; i++) {
    const d = document.createElement('div');
    d.className = 'sdot '
      + (letterDone || i < sIdx ? 'complete'
       : i === sIdx             ? 'active'
       :                          '');
    dots.appendChild(d);
  }

  const h = document.getElementById('hint');
  if (letterDone) {
    h.textContent = lIdx < letters.length - 1
      ? '✓ Letter complete! Press Next to continue.'
      : '✓ All letters complete! Great job!';
    h.className = 'hint done';
  } else {
    const pct = totalArc > 0 ? Math.round((currentArc / totalArc) * 100) : 0;
    h.textContent = `Stroke ${sIdx+1} of ${ns} — trace the dotted path (${pct}%)`;
    h.className   = 'hint active';
  }

  document.getElementById('btnPrev').disabled = lIdx === 0;
  document.getElementById('btnNext').disabled = lIdx === letters.length - 1;
  const btnN = document.getElementById('btnNext');
  btnN.className = (doneLetter[lIdx] && lIdx < letters.length - 1) ? 'btn-c ok' : 'btn-c ink';
}

function updateHintProgress() {
  if (letterDone) return;
  const h   = document.getElementById('hint');
  const pct = totalArc > 0 ? Math.round((currentArc / totalArc) * 100) : 0;
  h.textContent = `Stroke ${sIdx+1} of ${letters[lIdx].strokes.length} — trace the dotted path (${pct}%)`;
  h.className   = 'hint active';
}

function updateHintOffPath() {
  const h = document.getElementById('hint');
  h.textContent = 'Off path — move back onto the dotted guide to continue';
  h.className   = 'hint error';
}

/* ══════════════════════════════════════════════════════════
   RESIZE
══════════════════════════════════════════════════════════ */
let _rt;
window.addEventListener('resize', () => {
  clearTimeout(_rt);
  _rt = setTimeout(() => {
    if (!letters.length) return;
    setupCanvases();
    renderBg(letters[lIdx].char);
    // Re-scale completed strokes
    completedStrokes = letters[lIdx].strokes.slice(0, sIdx).map(s => scalePoly(s));
    renderDone();
    if (!letterDone && sIdx < letters[lIdx].strokes.length) {
      activePoly = scalePoly(letters[lIdx].strokes[sIdx]);
      totalArc   = arcLength(activePoly);
      waypoints  = buildWaypoints(activePoly);
      currentArc = 0;
      xLive.clearRect(0, 0, CS, CS);
    }
    renderLive();
    renderGuide();
  }, 150);
});
</script>
</body>
</html>

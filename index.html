<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tibetan Stroke Recorder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@500&family=Noto+Serif+Tibetan:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #F3F5FA;
  --surface:   #FFFFFF;
  --border:    #E2E7F0;
  --text-1:    #111827;
  --text-2:    #4B5563;
  --text-3:    #9CA3AF;
  --accent:    #3B5CE5;
  --accent-lt: #EEF1FE;
  --green:     #16A34A;
  --green-lt:  #DCFCE7;
  --amber:     #D97706;
  --amber-lt:  #FEF3C7;
  --red:       #DC2626;
  --red-lt:    #FEE2E2;
  --radius:    14px;
  --shadow:    0 2px 16px rgba(0,0,0,0.06);
  --canvas-size: min(440px, calc(100vw - 40px));
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  color: var(--text-1);
  padding-bottom: 48px;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 13px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 12px;
}
.topbar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.topbar-logo {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif Tibetan', serif;
  font-size: 1rem; color: #fff; flex-shrink: 0;
}
.topbar h1 {
  font-size: 0.9rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.topbar h1 small {
  display: block; font-size: 0.72rem; font-weight: 400; color: var(--text-3);
}
.progress-pill {
  font-size: 0.75rem; font-weight: 600;
  background: var(--accent-lt); color: var(--accent);
  padding: 4px 12px; border-radius: 99px; white-space: nowrap; flex-shrink: 0;
}

.layout {
  display: flex; flex-direction: column; align-items: center;
  gap: 14px; padding: 18px 16px 0;
  max-width: 520px; margin: 0 auto;
}

.section-label {
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-3);
  width: 100%; padding: 0 2px;
}

.letter-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 5px; width: 100%;
}
@media (max-width: 400px) {
  .letter-grid { grid-template-columns: repeat(6, 1fr); }
}

.lgrid-btn {
  aspect-ratio: 1; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 1rem; font-family: 'Noto Serif Tibetan', serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: border-color 0.1s, background 0.1s;
  color: var(--text-2); position: relative; padding: 0;
}
.lgrid-btn:hover { border-color: var(--accent); background: var(--accent-lt); }
.lgrid-btn.active {
  border-color: var(--accent); background: var(--accent-lt); color: var(--accent); font-weight: 700;
}
.lgrid-btn.saved {
  border-color: var(--green); background: var(--green-lt); color: var(--green);
}
.lgrid-btn.saved::after {
  content: '';
  position: absolute; top: -3px; right: -3px;
  width: 8px; height: 8px;
  background: var(--green); border-radius: 50%;
  border: 1.5px solid var(--bg);
}
.lgrid-btn.active.saved { border-color: var(--amber); background: var(--amber-lt); color: var(--amber); }
.lgrid-btn.active.saved::after { background: var(--amber); }

.card {
  background: var(--surface); border-radius: 18px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  width: 100%; overflow: hidden;
}

.letter-header {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.letter-bigchar {
  font-size: 2rem; font-family: 'Noto Serif Tibetan', serif;
  width: 52px; height: 52px; background: var(--bg);
  border-radius: 12px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; line-height: 1;
}
.letter-info { flex: 1; min-width: 0; }
.letter-info h2 { font-size: 1.05rem; font-weight: 700; }
.letter-info p  { font-size: 0.76rem; color: var(--text-3); margin-top: 2px; }
.strokes-badge {
  font-size: 0.72rem; font-weight: 600;
  background: var(--bg); color: var(--text-2);
  border: 1px solid var(--border); padding: 4px 10px; border-radius: 99px;
}

.canvas-wrapper {
  position: relative;
  width: var(--canvas-size); height: var(--canvas-size);
  margin: 14px auto;
  border-radius: 12px; border: 1px solid var(--border);
  background: #FAFBFF; cursor: crosshair;
  touch-action: none; overflow: hidden;
}
.canvas-wrapper canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}

.processing-info {
  display: flex; gap: 6px; padding: 0 18px 10px; flex-wrap: wrap;
}
.p-stat {
  font-size: 0.68rem; font-weight: 600;
  padding: 3px 8px; border-radius: 5px;
  background: var(--accent-lt); color: var(--accent);
  border: 1px solid rgba(59,92,229,0.15);
}
.p-stat span { font-weight: 700; }

.stroke-bar {
  display: flex; align-items: center; gap: 10px; padding: 0 18px 10px;
}
.stroke-chip {
  font-size: 0.72rem; font-weight: 700;
  padding: 4px 12px; border-radius: 99px; color: white; white-space: nowrap;
}
.stroke-hint { font-size: 0.78rem; color: var(--text-2); }

.strokes-panel { padding: 0 18px 10px; display: flex; flex-direction: column; gap: 4px; }
.stroke-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 6px 10px;
  font-size: 0.78rem; font-weight: 600; color: var(--text-2);
}
.stroke-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.stroke-pts {
  margin-left: auto; font-family: 'DM Mono', monospace;
  font-size: 0.7rem; color: var(--text-3);
}
.stroke-del {
  background: var(--red-lt); border: none; color: var(--red);
  border-radius: 5px; padding: 2px 7px; font-size: 0.7rem;
  font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: background 0.1s;
}
.stroke-del:hover { background: #fca5a5; }
.empty-strokes {
  font-size: 0.74rem; color: var(--text-3); text-align: center; padding: 4px 0;
}

.divider { height: 1px; background: var(--border); margin: 0 18px; }

.btn-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 7px; padding: 14px 18px;
}
@media (max-width: 360px) {
  .btn-grid { grid-template-columns: repeat(2, 1fr); }
}

.btn {
  padding: 10px 6px; border-radius: 10px; border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.76rem; font-weight: 700; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  line-height: 1.2; transition: filter 0.1s;
}
.btn:hover { filter: brightness(0.94); }
.btn-sym { font-size: 0.9rem; line-height: 1; }
.btn-undo   { background: var(--amber-lt); color: var(--amber); }
.btn-clear  { background: var(--red-lt);   color: var(--red);   }
.btn-stroke { background: var(--accent-lt);color: var(--accent); }

.save-row { padding: 0 18px 18px; display: flex; gap: 7px; }
.btn-save-full {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  background: var(--green); color: white;
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background 0.12s;
}
.btn-save-full:hover { background: #15803d; }
.btn-save-full.saved-state { background: #15803d; }

.btn-export {
  padding: 12px 14px; border-radius: 12px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text-2); font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: border-color 0.1s, color 0.1s; white-space: nowrap; flex-shrink: 0;
}
.btn-export:hover { border-color: var(--accent); color: var(--accent); }

.export-panel {
  background: var(--surface); border-radius: 18px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  width: 100%; overflow: hidden; display: none;
}
.export-header {
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.export-header h3 { font-size: 0.88rem; font-weight: 700; }
.export-close {
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem; color: var(--text-2); font-family: 'DM Sans', sans-serif;
}
.export-stats { display: flex; gap: 6px; padding: 10px 18px; flex-wrap: wrap; }
.export-stat {
  font-size: 0.72rem; font-weight: 600; padding: 3px 9px;
  border-radius: 6px; background: var(--bg); color: var(--text-2);
  border: 1px solid var(--border);
}
.export-stat span { color: var(--accent); }
textarea#outputBox {
  width: 100%; font-family: 'DM Mono', monospace; font-size: 0.67rem;
  background: #0F172A; color: #6EE7B7; border: none;
  resize: vertical; min-height: 120px; padding: 12px 16px; outline: none; line-height: 1.6;
}
.export-actions { padding: 10px 18px; display: flex; gap: 7px; }
.btn-copy {
  flex: 1; padding: 10px; border-radius: 10px; border: none;
  background: var(--accent); color: white;
  font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 700;
  cursor: pointer; transition: background 0.1s;
}
.btn-copy:hover { background: #2e4cc7; }
.btn-download {
  padding: 10px 14px; border-radius: 10px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text-2); font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem; font-weight: 700; cursor: pointer; transition: border-color 0.1s, color 0.1s;
}
.btn-download:hover { border-color: var(--accent); color: var(--accent); }

.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #111827; color: white; padding: 9px 18px;
  border-radius: 99px; font-size: 0.8rem; font-weight: 600;
  z-index: 9999; transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap; box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">ཀ</div>
    <h1>Stroke Recorder <small>Tibetan Alphabet</small></h1>
  </div>
  <div class="progress-pill" id="progressPill">0 / 30</div>
</div>

<div class="layout">

  <div class="section-label">Select Letter</div>
  <div class="letter-grid" id="letterGrid"></div>

  <div class="card">

    <div class="letter-header">
      <div class="letter-bigchar" id="bigChar">ཀ</div>
      <div class="letter-info">
        <h2 id="letterName">Ka</h2>
        <p id="letterDesc">1st consonant · Tibetan alphabet</p>
      </div>
      <div class="strokes-badge" id="strokesBadge">0 strokes</div>
    </div>

    <div class="canvas-wrapper" id="canvasWrap">
      <canvas id="bgCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
    </div>

    <div class="processing-info" id="processingInfo" style="display:none">
      <div class="p-stat">Raw: <span id="statRaw">0</span> pts</div>
      <div class="p-stat">Filtered: <span id="statFiltered">0</span> pts</div>
      <div class="p-stat">Simplified: <span id="statSimplified">0</span> pts</div>
    </div>

    <div class="stroke-bar">
      <div class="stroke-chip" id="strokeChip" style="background:var(--accent)">Stroke 1</div>
      <div class="stroke-hint" id="strokeHint">Draw the first stroke on the canvas above</div>
    </div>

    <div class="strokes-panel" id="strokesPanel">
      <div class="empty-strokes" id="emptyStrokes">No strokes yet — start drawing above</div>
    </div>

    <div class="divider"></div>

    <div class="btn-grid">
      <button class="btn btn-undo" onclick="undoPoint()">
        <span class="btn-sym">&#8630;</span>Undo
      </button>
      <button class="btn btn-clear" onclick="clearStroke()">
        <span class="btn-sym">&#215;</span>Clear
      </button>
      <button class="btn btn-stroke" onclick="addStroke()">
        <span class="btn-sym">+</span>Add Stroke
      </button>
      <button class="btn btn-stroke" onclick="saveLetter()" style="background:var(--green-lt);color:var(--green)">
        <span class="btn-sym">&#10003;</span>Save
      </button>
    </div>

    <div class="save-row">
      <button class="btn-save-full" id="saveBtn" onclick="saveLetter()">
        Save Letter &amp; Continue
      </button>
      <button class="btn-export" onclick="toggleExport()">Export JSON</button>
    </div>

  </div>

  <div class="export-panel" id="exportPanel">
    <div class="export-header">
      <h3>Export JSON Data</h3>
      <button class="export-close" onclick="toggleExport()">&#215;</button>
    </div>
    <div class="export-stats" id="exportStats"></div>
    <textarea id="outputBox" readonly placeholder="Save some letters first to export…"></textarea>
    <div class="export-actions">
      <button class="btn-copy" onclick="copyJSON()">Copy JSON</button>
      <button class="btn-download" onclick="downloadJSON()">Download</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIGURATION
═══════════════════════════════════════════════════════ */
const CONFIG = {
  SIMPLIFY_EPSILON:      0.008,  // Douglas-Peucker tolerance (normalized 0-1)
  MIN_PT_DISTANCE:       0.015,  // Minimum point spacing (normalized 0-1)
  CANVAS_SIZE:           1000,   // Reference size for export metadata only
  RAW_MIN_DISTANCE:      8,      // Min px between raw captured points
  RAW_MIN_DISTANCE_INIT: 4,      // Min px for first few points
};

/* ═══════════════════════════════════════════════════════
   GEOMETRY
═══════════════════════════════════════════════════════ */
function dist(p1, p2) {
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  return Math.sqrt(dx * dx + dy * dy);
}

function perpDist(p, v, w) {
  const l2 = (w.x - v.x) ** 2 + (w.y - v.y) ** 2;
  if (l2 === 0) return dist(p, v);
  const t = Math.max(0, Math.min(1,
    ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2));
  return dist(p, { x: v.x + t * (w.x - v.x), y: v.y + t * (w.y - v.y) });
}

// Douglas-Peucker simplification
function simplify(pts, eps) {
  if (pts.length <= 2) return pts;
  let maxD = 0, maxI = 0;
  const s = pts[0], e = pts[pts.length - 1];
  for (let i = 1; i < pts.length - 1; i++) {
    const d = perpDist(pts[i], s, e);
    if (d > maxD) { maxD = d; maxI = i; }
  }
  if (maxD > eps) {
    const L = simplify(pts.slice(0, maxI + 1), eps);
    const R = simplify(pts.slice(maxI), eps);
    return L.slice(0, -1).concat(R);
  }
  return [s, e];
}

// Adaptive min-distance filter
function minDistFilter(pts, threshold) {
  if (pts.length <= 1) return pts;
  const out = [pts[0]];
  let last = pts[0];
  for (let i = 1; i < pts.length; i++) {
    const th = out.length < 5 ? threshold * 0.5 : threshold;
    if (dist(pts[i], last) >= th) { out.push(pts[i]); last = pts[i]; }
  }
  const tail = pts[pts.length - 1];
  if (dist(out[out.length - 1], tail) > 0) out.push(tail);
  return out;
}

// Full point-processing pipeline
function processPoints(rawPts) {
  const stats = { raw: rawPts.length, filtered: 0, simplified: 0 };
  if (rawPts.length < 2) return { points: rawPts, stats };
  let pts = minDistFilter(rawPts, CONFIG.RAW_MIN_DISTANCE);
  stats.filtered = pts.length;
  pts = simplify(pts, CONFIG.SIMPLIFY_EPSILON * CSIZE);
  stats.simplified = pts.length;
  return { points: pts, stats };
}

/* ═══════════════════════════════════════════════════════
   NORMALIZE — stores coords EXACTLY as drawn (no rescaling)
   Simply divides pixel coords by CSIZE to get 0..1 range.
   On reload, multiply by CSIZE to restore pixel coords.
═══════════════════════════════════════════════════════ */
function normalize(rawStrokes) {
  if (!rawStrokes.length) return { strokes: [], bounds: null };

  const r4 = v => Math.round(v * 10000) / 10000;

  // Compute bounding box for metadata only — NOT used for scaling
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  rawStrokes.forEach(s => s.points.forEach(p => {
    const nx = p.x / CSIZE, ny = p.y / CSIZE;
    if (nx < minX) minX = nx; if (ny < minY) minY = ny;
    if (nx > maxX) maxX = nx; if (ny > maxY) maxY = ny;
  }));

  return {
    strokes: rawStrokes.map(s => ({
      type: 'path',
      // Store exact position: just divide by canvas size
      points: s.points.map(p => ({
        x: r4(p.x / CSIZE),
        y: r4(p.y / CSIZE)
      }))
    })),
    bounds: {
      minX: r4(minX), maxX: r4(maxX),
      minY: r4(minY), maxY: r4(maxY)
    }
  };
}

/* ═══════════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════════ */
const ALPHABET = [
  { char:'ཀ', name:'Ka',   desc:'1st consonant'  },
  { char:'ཁ', name:'Kha',  desc:'2nd consonant'  },
  { char:'ག', name:'Ga',   desc:'3rd consonant'  },
  { char:'ང', name:'Nga',  desc:'4th consonant'  },
  { char:'ཅ', name:'Ca',   desc:'5th consonant'  },
  { char:'ཆ', name:'Cha',  desc:'6th consonant'  },
  { char:'ཇ', name:'Ja',   desc:'7th consonant'  },
  { char:'ཉ', name:'Nya',  desc:'8th consonant'  },
  { char:'ཏ', name:'Ta',   desc:'9th consonant'  },
  { char:'ཐ', name:'Tha',  desc:'10th consonant' },
  { char:'ད', name:'Da',   desc:'11th consonant' },
  { char:'ན', name:'Na',   desc:'12th consonant' },
  { char:'པ', name:'Pa',   desc:'13th consonant' },
  { char:'ཕ', name:'Pha',  desc:'14th consonant' },
  { char:'བ', name:'Ba',   desc:'15th consonant' },
  { char:'མ', name:'Ma',   desc:'16th consonant' },
  { char:'ཙ', name:'Tsa',  desc:'17th consonant' },
  { char:'ཚ', name:'Tsha', desc:'18th consonant' },
  { char:'ཛ', name:'Dza',  desc:'19th consonant' },
  { char:'ཝ', name:'Wa',   desc:'20th consonant' },
  { char:'ཞ', name:'Zha',  desc:'21st consonant' },
  { char:'ཟ', name:'Za',   desc:'22nd consonant' },
  { char:'འ', name:"'A",   desc:'23rd consonant' },
  { char:'ཡ', name:'Ya',   desc:'24th consonant' },
  { char:'ར', name:'Ra',   desc:'25th consonant' },
  { char:'ལ', name:'La',   desc:'26th consonant' },
  { char:'ཤ', name:'Sha',  desc:'27th consonant' },
  { char:'ས', name:'Sa',   desc:'28th consonant' },
  { char:'ཧ', name:'Ha',   desc:'29th consonant' },
  { char:'ཨ', name:'A',    desc:'30th consonant' },
];

const COLORS = [
  '#3B5CE5','#E07B39','#16A34A','#DC2626',
  '#9333EA','#0891B2','#CA8A04','#BE185D',
];

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let savedData  = {};
let currentIdx = 0;
let strokes    = [];      // committed strokes [{color, points, rawPoints, stats}]
let currentPts = [];      // in-progress raw points
let isDrawing  = false;
let lastPt     = null;

// Use new storage key so old inflated data doesn't interfere
const STORAGE_KEY = 'tib_paths_v4_exact';
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) savedData = JSON.parse(raw);
} catch(e) {}

/* ═══════════════════════════════════════════════════════
   CANVAS SETUP
═══════════════════════════════════════════════════════ */
const wrap       = document.getElementById('canvasWrap');
const bgCanvas   = document.getElementById('bgCanvas');
const drawCanvas = document.getElementById('drawCanvas');
let bc, dc, CSIZE, DPR;

function setupCanvas() {
  DPR = window.devicePixelRatio || 1;
  const rect = wrap.getBoundingClientRect();
  CSIZE = rect.width;
  [bgCanvas, drawCanvas].forEach(c => {
    c.width  = Math.round(CSIZE * DPR);
    c.height = Math.round(CSIZE * DPR);
    c.style.width  = CSIZE + 'px';
    c.style.height = CSIZE + 'px';
  });
  bc = bgCanvas.getContext('2d');
  dc = drawCanvas.getContext('2d');
  bc.scale(DPR, DPR);
  dc.scale(DPR, DPR);
}

function getPos(e) {
  const rect = wrap.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * (CSIZE / rect.width),
    y: (src.clientY - rect.top)  * (CSIZE / rect.height),
  };
}

/* ═══════════════════════════════════════════════════════
   DRAWING
═══════════════════════════════════════════════════════ */
function drawBg() {
  bc.clearRect(0, 0, CSIZE, CSIZE);
  bc.strokeStyle = '#E9ECF6'; bc.lineWidth = 1; bc.setLineDash([3, 6]);
  [CSIZE / 3, CSIZE * 2 / 3].forEach(v => {
    bc.beginPath(); bc.moveTo(v, 0);     bc.lineTo(v, CSIZE);  bc.stroke();
    bc.beginPath(); bc.moveTo(0, v);     bc.lineTo(CSIZE, v);  bc.stroke();
  });
  bc.setLineDash([]);
  bc.strokeStyle = '#D1D8EE'; bc.lineWidth = 1;
  bc.beginPath(); bc.moveTo(CSIZE / 2, 0);     bc.lineTo(CSIZE / 2, CSIZE); bc.stroke();
  bc.beginPath(); bc.moveTo(0, CSIZE / 2);     bc.lineTo(CSIZE, CSIZE / 2); bc.stroke();
  // Ghost letter
  const fs = Math.round(CSIZE * 0.62);
  bc.font = `700 ${fs}px "Noto Serif Tibetan", serif`;
  bc.textAlign = 'center'; bc.textBaseline = 'alphabetic';
  const char = ALPHABET[currentIdx].char;
  const m = bc.measureText(char);
  const th = m.actualBoundingBoxAscent + m.actualBoundingBoxDescent;
  bc.fillStyle = 'rgba(59,92,229,0.07)';
  bc.fillText(char, CSIZE / 2, CSIZE / 2 + m.actualBoundingBoxAscent - th / 2);
}

function redraw() {
  dc.clearRect(0, 0, CSIZE, CSIZE);
  strokes.forEach((s, si) => {
    if (s.points.length < 1) return;
    drawLine(s.points, s.color, 1.0);
    drawDots(s.points, s.color, si + 1, 1.0);
  });
  if (currentPts.length > 0) {
    const col = COLORS[strokes.length % COLORS.length];
    drawLine(currentPts, col, 0.55);
    drawDots(currentPts, col, strokes.length + 1, 0.55);
  }
}

function drawLine(pts, color, alpha) {
  if (pts.length < 2) return;
  dc.save(); dc.globalAlpha = alpha;
  dc.beginPath(); dc.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i + 1].x) / 2;
    const my = (pts[i].y + pts[i + 1].y) / 2;
    dc.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  dc.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  dc.strokeStyle = color; dc.lineWidth = 3.5;
  dc.lineCap = 'round'; dc.lineJoin = 'round';
  dc.stroke(); dc.restore();
}

function drawDots(pts, color, num, alpha) {
  dc.save(); dc.globalAlpha = alpha;
  pts.forEach((p, pi) => {
    const r = pi === 0 ? 6.5 : 3;
    dc.beginPath(); dc.arc(p.x, p.y, r, 0, Math.PI * 2);
    dc.fillStyle = color; dc.fill();
    if (pi === 0) {
      dc.font = `bold ${Math.round(CSIZE * 0.024)}px DM Sans, sans-serif`;
      dc.fillStyle = 'white'; dc.textAlign = 'center'; dc.textBaseline = 'middle';
      dc.fillText(num, p.x, p.y);
    }
  });
  dc.restore();
}

/* ═══════════════════════════════════════════════════════
   POINTER EVENTS
═══════════════════════════════════════════════════════ */
wrap.addEventListener('pointerdown', e => {
  e.preventDefault();
  wrap.setPointerCapture(e.pointerId);
  isDrawing = true; lastPt = null;
  const pos = getPos(e);
  currentPts = [pos]; lastPt = pos;
  redraw();
});

wrap.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  e.preventDefault();
  const pos = getPos(e);
  const minD = currentPts.length < 5 ? CONFIG.RAW_MIN_DISTANCE_INIT : CONFIG.RAW_MIN_DISTANCE;
  if (lastPt) {
    const dx = pos.x - lastPt.x, dy = pos.y - lastPt.y;
    if (Math.sqrt(dx * dx + dy * dy) < minD) return;
  }
  currentPts.push(pos); lastPt = pos;
  redraw(); updateStrokeInfo();
});

wrap.addEventListener('pointerup',     () => { isDrawing = false; });
wrap.addEventListener('pointercancel', () => { isDrawing = false; });

/* ═══════════════════════════════════════════════════════
   CONTROLS
═══════════════════════════════════════════════════════ */
function undoPoint() {
  if (currentPts.length > 0) {
    currentPts.pop();
    lastPt = currentPts[currentPts.length - 1] || null;
  } else if (strokes.length > 0) {
    const last = strokes.pop();
    currentPts = [...last.rawPoints]; currentPts.pop();
    lastPt = currentPts[currentPts.length - 1] || null;
    updateStrokesList();
  }
  redraw(); updateStrokeInfo();
}

function clearStroke() {
  currentPts = []; lastPt = null;
  redraw(); updateStrokeInfo();
}

function addStroke() {
  if (currentPts.length < 2) { showToast('Draw at least 2 points first'); return; }
  const { points, stats } = processPoints(currentPts);
  const col = COLORS[strokes.length % COLORS.length];
  strokes.push({ color: col, points, rawPoints: [...currentPts], stats });
  currentPts = []; lastPt = null;
  updateProcessingInfo(stats);
  updateStrokesList(); updateStrokeInfo(); redraw();
  showToast(`Stroke ${strokes.length} added (${stats.simplified} pts)`);
}

function doSave() {
  const all = [...strokes];
  if (currentPts.length >= 2) {
    const { points, stats } = processPoints(currentPts);
    all.push({ color: COLORS[all.length % COLORS.length], points, rawPoints: [...currentPts], stats });
  }
  if (all.length === 0) { showToast('No strokes to save'); return false; }
  const { strokes: normStrokes, bounds } = normalize(all);
  savedData[currentIdx] = { strokes: normStrokes, bounds, canvasSize: CONFIG.CANVAS_SIZE };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData)); } catch(e) {}
  return true;
}

/* ─────────────────────────────────────────────────────
   restoreStrokes: multiply saved 0-1 coords back by
   current CSIZE so playback is pixel-perfect at any size
───────────────────────────────────────────────────── */
function restoreStrokes(savedEntry) {
  return savedEntry.strokes.map((s, i) => ({
    color: COLORS[i % COLORS.length],
    points: s.points.map(p => ({ x: p.x * CSIZE, y: p.y * CSIZE })),
    rawPoints: s.points.map(p => ({ x: p.x * CSIZE, y: p.y * CSIZE })),
    stats: { raw: 0, filtered: s.points.length, simplified: s.points.length }
  }));
}

function saveLetter() {
  if (!doSave()) return;
  currentPts = []; lastPt = null;
  strokes = savedData[currentIdx] ? restoreStrokes(savedData[currentIdx]) : [];
  updateGrid(); updateHeader(); updateStrokesList(); redraw();
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saved!';
  btn.classList.add('saved-state');
  setTimeout(() => {
    btn.textContent = 'Save Letter & Continue';
    btn.classList.remove('saved-state');
  }, 1400);
  showToast(`${ALPHABET[currentIdx].name} saved`);
  const next = ALPHABET.findIndex((_, i) => i > currentIdx && !savedData[i]);
  if (next !== -1) setTimeout(() => selectLetter(next), 600);
}

/* ═══════════════════════════════════════════════════════
   LETTER SELECTION
═══════════════════════════════════════════════════════ */
function selectLetter(idx) {
  if (idx === currentIdx) return;
  if ((strokes.length > 0 || currentPts.length >= 2) && !savedData[currentIdx]) {
    if (confirm(`Save current work on ${ALPHABET[currentIdx].char} before switching?`)) doSave();
  }
  currentIdx = idx;
  strokes = savedData[idx] ? restoreStrokes(savedData[idx]) : [];
  currentPts = []; lastPt = null;
  updateGrid(); updateHeader(); updateStrokesList(); updateStrokeInfo();
  drawBg(); redraw();
}

/* ═══════════════════════════════════════════════════════
   UI UPDATES
═══════════════════════════════════════════════════════ */
function buildGrid() {
  const grid = document.getElementById('letterGrid');
  grid.innerHTML = '';
  ALPHABET.forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'lgrid-btn';
    btn.textContent = l.char;
    btn.title = `${l.name} · ${l.desc}`;
    btn.id = `lb-${i}`;
    btn.onclick = () => selectLetter(i);
    grid.appendChild(btn);
  });
  updateGrid();
}

function updateGrid() {
  ALPHABET.forEach((_, i) => {
    const btn = document.getElementById(`lb-${i}`);
    if (!btn) return;
    btn.className = 'lgrid-btn'
      + (i === currentIdx ? ' active' : '')
      + (savedData[i]     ? ' saved'  : '');
  });
}

function updateHeader() {
  const l = ALPHABET[currentIdx];
  document.getElementById('bigChar').textContent   = l.char;
  document.getElementById('letterName').textContent  = l.name;
  document.getElementById('letterDesc').textContent  = `${l.desc} · Tibetan alphabet`;
  document.getElementById('strokesBadge').textContent =
    `${strokes.length} stroke${strokes.length !== 1 ? 's' : ''}`;
  document.getElementById('progressPill').textContent =
    `${Object.keys(savedData).length} / ${ALPHABET.length}`;
}

function updateProcessingInfo(stats) {
  const info = document.getElementById('processingInfo');
  if (stats) {
    info.style.display = 'flex';
    document.getElementById('statRaw').textContent       = stats.raw;
    document.getElementById('statFiltered').textContent  = stats.filtered;
    document.getElementById('statSimplified').textContent = stats.simplified;
  } else {
    info.style.display = 'none';
  }
}

function updateStrokeInfo() {
  const si  = strokes.length;
  const col = COLORS[si % COLORS.length];
  const pts = currentPts.length;
  const chip = document.getElementById('strokeChip');
  chip.textContent = `Stroke ${si + 1}`;
  chip.style.background = col;
  document.getElementById('strokeHint').textContent =
    pts === 0
      ? `Draw stroke ${si + 1} on the canvas above`
      : `${pts} point${pts !== 1 ? 's' : ''} — press Add Stroke to commit`;
  document.getElementById('strokesBadge').textContent =
    `${si} stroke${si !== 1 ? 's' : ''}`;
}

function updateStrokesList() {
  const panel = document.getElementById('strokesPanel');
  const empty = document.getElementById('emptyStrokes');
  if (strokes.length === 0) {
    panel.innerHTML = '';
    panel.appendChild(empty);
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  panel.innerHTML = strokes.map((s, i) => `
    <div class="stroke-row">
      <div class="stroke-dot" style="background:${s.color}"></div>
      Stroke ${i + 1}
      <span class="stroke-pts">${s.points.length} pts</span>
      <button class="stroke-del" onclick="deleteStroke(${i})">&#215;</button>
    </div>
  `).join('') + `<div id="emptyStrokes" style="display:none"></div>`;
  updateStrokeInfo();
}

function deleteStroke(idx) {
  strokes.splice(idx, 1);
  strokes = strokes.map((s, i) => ({ ...s, color: COLORS[i % COLORS.length] }));
  updateStrokesList(); redraw(); showToast('Stroke removed');
}

/* ═══════════════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════════════ */
function buildExportData() {
  const out = {
    version: '2.0',
    coordinateSystem: 'normalized-0-1-exact',
    note: 'Coordinates are exact (x/canvasSize, y/canvasSize). No rescaling applied.',
    canvasSize: CONFIG.CANVAS_SIZE,
    letters: {}
  };
  ALPHABET.forEach((l, i) => {
    if (savedData[i]) {
      out.letters[l.char] = {
        name: l.name, index: i + 1,
        strokes: savedData[i].strokes,
        boundingBox: savedData[i].bounds
      };
    }
  });
  return out;
}

function toggleExport() {
  const panel = document.getElementById('exportPanel');
  if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
  if ((strokes.length > 0 || currentPts.length >= 2) && !savedData[currentIdx]) doSave();
  const data = buildExportData();
  const keys = Object.keys(data.letters);
  if (keys.length === 0) { showToast('Save some letters first'); return; }
  const json = JSON.stringify(data, null, 2);
  document.getElementById('outputBox').value = json;
  let totalSt = 0, totalPts = 0;
  Object.values(data.letters).forEach(l => {
    totalSt += l.strokes.length;
    totalPts += l.strokes.reduce((a, s) => a + s.points.length, 0);
  });
  document.getElementById('exportStats').innerHTML =
    `<div class="export-stat">Format: <span>v2.0 exact</span></div>
     <div class="export-stat">Letters: <span>${keys.length}</span></div>
     <div class="export-stat">Strokes: <span>${totalSt}</span></div>
     <div class="export-stat">Points: <span>${totalPts}</span></div>
     <div class="export-stat">Size: <span>~${Math.round(json.length / 1024 * 10) / 10} KB</span></div>`;
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function copyJSON() {
  const txt = document.getElementById('outputBox').value;
  if (!txt) { showToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(txt)
    .then(() => showToast('JSON copied to clipboard'))
    .catch(() => { document.getElementById('outputBox').select(); document.execCommand('copy'); showToast('Copied'); });
}

function downloadJSON() {
  const txt = document.getElementById('outputBox').value;
  if (!txt) { showToast('Nothing to download'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([txt], { type: 'application/json' }));
  a.download = 'tibetan_strokes_v2_exact.json';
  a.click(); showToast('Downloading…');
}

/* ═══════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

/* ═══════════════════════════════════════════════════════
   RESIZE
═══════════════════════════════════════════════════════ */
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    setupCanvas();
    drawBg();
    // Re-scale restored strokes to new canvas size
    if (savedData[currentIdx]) {
      strokes = restoreStrokes(savedData[currentIdx]);
    }
    redraw();
  }, 120);
});

/* ═══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
buildGrid();
updateHeader();

document.fonts.ready.then(() => {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    setupCanvas(); drawBg();
    if (savedData[0]) {
      strokes = restoreStrokes(savedData[0]);
      updateStrokesList();
      redraw();
    }
    updateStrokeInfo();
  }));
});
</script>
</body>
</html>
